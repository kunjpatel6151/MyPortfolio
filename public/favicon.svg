  />
  <!-- Star tips -->
  <circle cx="50" cy="4" r="3" fill="#f1ead6" stroke="#2a1a08" stroke-width="1"/>
  <circle cx="96" cy="38" r="3" fill="#f1ead6" stroke="#2a1a08" stroke-width="1"/>
  <circle cx="78" cy="92" r="3" fill="#f1ead6" stroke="#2a1a08" stroke-width="1"/>
  <circle cx="22" cy="92" r="3" fill="#f1ead6" stroke="#2a1a08" stroke-width="1"/>
  <circle cx="4" cy="38" r="3" fill="#f1ead6" stroke="#2a1a08" stroke-width="1"/>
  <!-- Center circle -->
  <circle cx="50" cy="52" r="16" fill="#1a1a1a" stroke="#f1ead6" stroke-width="1.5"/>
  <!-- Initials -->
  <text x="50" y="58" text-anchor="middle" font-size="14" fill="#f1ead6" font-family="Impact, sans-serif" font-weight="400">KP</text>
