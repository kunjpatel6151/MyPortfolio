<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f3d97a"/>
      <stop offset="60%" stop-color="#b8862b"/>
      <stop offset="100%" stop-color="#5a3a10"/>
    </radialGradient>
  </defs>
  <!-- 5-point star -->
  <polygon
    points="50,4 61,38 96,38 67,58 78,92 50,72 22,92 33,58 4,38 39,38"
